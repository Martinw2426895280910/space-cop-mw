<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SPACE COP MW</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;user-select:none;-webkit-user-select:none}
#gc{position:fixed;top:0;left:0;width:100%;height:100%}
#pc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
/* HUD */
#hud{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(0,5,20,.88);border-bottom:1px solid rgba(0,200,255,.3);display:none;align-items:center;justify-content:space-between;padding:0 12px;z-index:30;pointer-events:none}
#hud-lv{color:#00e5ff;font-size:15px;font-weight:900;text-shadow:0 0 10px #00e5ff;letter-spacing:.08em}
#hud-mid{display:flex;flex-direction:column;align-items:center;gap:1px}
#hud-sc{color:#fff;font-size:12px;font-weight:700}
#hud-kl{color:#a78bfa;font-size:10px}
#hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
#hp-wrap{width:80px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;border:1px solid rgba(0,200,255,.25);overflow:hidden}
#hp-bar{height:100%;width:100%;background:linear-gradient(90deg,#22c55e,#00e5ff);border-radius:4px;transition:width .2s}
#hud-pu{color:#f97316;font-size:10px;font-weight:700;min-height:12px}
/* Controls */
#ctrl{position:fixed;bottom:0;left:0;right:0;height:200px;display:none;z-index:30;pointer-events:none}
#jz{position:absolute;bottom:20px;left:20px;pointer-events:all}
#jbase{width:140px;height:140px;border-radius:50%;background:rgba(0,10,30,.92);border:2px solid rgba(0,200,255,.5);position:relative;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,200,255,.2)}
#jstick{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00e5ff,#005588);border:2px solid rgba(0,229,255,.8);position:absolute;box-shadow:0 0 12px rgba(0,229,255,.5)}
#jlbl{position:absolute;top:-20px;left:50%;transform:translateX(-50%);color:rgba(0,200,255,.6);font-size:9px;letter-spacing:.12em;white-space:nowrap}
#rbtns{position:absolute;bottom:20px;right:16px;display:flex;flex-direction:column;gap:10px;align-items:flex-end;pointer-events:all}
#bfire{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(249,115,22,.55),rgba(120,40,0,.85));border:3px solid #f97316;color:#fed7aa;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 0 25px rgba(249,115,22,.45);cursor:pointer}
#bfire:active{transform:scale(.92)}
#brow2{display:flex;gap:10px;align-items:center}
#bnova{width:68px;height:68px;border-radius:50%;background:rgba(0,10,40,.92);border:3px solid #a78bfa;color:#c4b5fd;font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;box-shadow:0 0 15px rgba(167,139,250,.3)}
#bnova:active{transform:scale(.92)}
#bnova.empty{opacity:.25;filter:grayscale(1)}
#ncnt{font-size:9px;color:#a78bfa}
#babort{background:rgba(0,0,20,.75);border:1px solid rgba(0,200,255,.25);color:rgba(0,200,255,.5);font-size:10px;letter-spacing:.08em;padding:6px 14px;cursor:pointer;border-radius:4px;pointer-events:all}
/* Overlays */
#ov-shield{position:fixed;inset:0;background:rgba(0,229,255,.08);pointer-events:none;display:none;z-index:25}
#ov-slow{position:fixed;inset:0;background:rgba(59,130,246,.1);pointer-events:none;display:none;z-index:24}
#ov-flash{position:fixed;inset:0;pointer-events:none;z-index:26;opacity:0;transition:opacity .1s}
/* MENU — simple and clear */
#menu{position:fixed;inset:0;background:linear-gradient(160deg,#020818,#050215);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px}
#menu h1{font-size:clamp(2.8rem,14vw,6rem);font-weight:900;letter-spacing:.15em;text-align:center;line-height:1;background:linear-gradient(135deg,#00e5ff,#a78bfa,#f97316);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 20px rgba(0,229,255,.5));margin-bottom:.2em}
#menu p{color:rgba(167,139,250,.8);font-size:.8rem;letter-spacing:.25em;margin-bottom:1.8em;text-align:center}
#menu .ibox{background:rgba(0,15,50,.7);border:1px solid rgba(0,200,255,.2);border-left:3px solid #00e5ff;border-radius:8px;padding:14px 18px;margin-bottom:1.8em;width:100%;max-width:300px}
#menu .irow{display:flex;gap:10px;align-items:center;margin:.3em 0;font-size:12px;color:rgba(167,139,250,.85)}
#menu .irow strong{color:#e0f2fe}
#playbtn{width:100%;max-width:280px;padding:18px;background:linear-gradient(135deg,rgba(0,100,200,.5),rgba(0,50,150,.7));border:2px solid #00e5ff;color:#fff;font-size:1.1rem;font-weight:900;letter-spacing:.12em;cursor:pointer;border-radius:8px;text-transform:uppercase;box-shadow:0 0 30px rgba(0,229,255,.35);margin-bottom:12px;-webkit-appearance:none;appearance:none}
#playbtn:active{background:rgba(0,180,255,.3);box-shadow:0 0 50px rgba(0,229,255,.7)}
#hs-line{color:#f97316;font-size:.8rem;text-align:center;display:none}
/* GAMEOVER */
#goscreen{position:fixed;inset:0;background:rgba(0,0,15,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px}
#goscreen h2{font-size:clamp(2rem,9vw,4rem);font-weight:900;letter-spacing:.1em;text-align:center;background:linear-gradient(135deg,#dc2626,#f97316);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:.5em}
#go-stats{margin-bottom:1.5em;text-align:center}
.srow{color:rgba(167,139,250,.8);font-size:.9rem;margin:.3em 0}
.srow span{color:#00e5ff;font-weight:700}
#bretry{width:100%;max-width:260px;padding:15px;background:linear-gradient(135deg,rgba(100,0,0,.5),rgba(180,0,0,.4));border:2px solid #dc2626;color:#fff;font-size:1rem;font-weight:900;letter-spacing:.1em;cursor:pointer;border-radius:8px;margin-bottom:10px;box-shadow:0 0 20px rgba(220,38,38,.3)}
#bretry:active{transform:scale(.96)}
#bmenu{width:100%;max-width:260px;padding:12px;background:transparent;border:1px solid rgba(167,139,250,.3);color:rgba(167,139,250,.7);font-size:.9rem;letter-spacing:.1em;cursor:pointer;border-radius:8px}
/* LEVELUP */
#luscreen{position:fixed;inset:0;background:rgba(0,0,20,.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px}
#luscreen h2{font-size:clamp(1.8rem,8vw,3.5rem);font-weight:900;letter-spacing:.1em;text-align:center;background:linear-gradient(135deg,#00e5ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:.5em}
#lu-info{color:#e0f2fe;font-size:.95rem;text-align:center;line-height:1.8;opacity:.85}
</style>
</head>
<body>

<canvas id="gc"></canvas>
<canvas id="pc"></canvas>

<div id="ov-shield"></div>
<div id="ov-slow"></div>
<div id="ov-flash"></div>

<!-- HUD -->
<div id="hud">
  <div id="hud-lv">SECTOR 1</div>
  <div id="hud-mid"><div id="hud-sc">SCORE: 0</div><div id="hud-kl">KILLS: 0</div></div>
  <div id="hud-right"><div id="hp-wrap"><div id="hp-bar"></div></div><div id="hud-pu"></div></div>
</div>

<!-- Controls -->
<div id="ctrl">
  <div id="jz"><div id="jbase"><span id="jlbl">THRUST</span><div id="jstick"></div></div></div>
  <div id="rbtns">
    <div id="babort">EJECT</div>
    <div id="brow2">
      <div id="bnova"><span style="font-size:16px">⚡</span><span id="ncnt">3</span></div>
      <div id="bfire">FIRE</div>
    </div>
  </div>
</div>

<!-- MENU -->
<div id="menu">
  <h1>SPACE<br/>COP</h1>
  <p>MW · ALIEN INVASION</p>
  <div class="ibox">
    <div class="irow"><span>🕹️</span><span><strong>Joystick</strong> izquierdo para moverte</span></div>
    <div class="irow"><span>🔥</span><span>Botón <strong>FIRE</strong> para disparar</span></div>
    <div class="irow"><span>⚡</span><span><strong>NOVA</strong> — onda de choque repulsiva</span></div>
    <div class="irow"><span>🟣</span><span>Llega al <strong>portal</strong> para avanzar</span></div>
  </div>
  <button id="playbtn" onclick="startGame()">⚡ INICIAR MISIÓN</button>
  <div id="hs-line">🏆 RÉCORD: <span id="hs-val">0</span></div>
</div>

<!-- GAME OVER -->
<div id="goscreen">
  <h2>MISIÓN FALLIDA</h2>
  <div id="go-stats"></div>
  <button id="bretry" onclick="retryGame()">↺ REINTENTAR</button>
  <button id="bmenu" onclick="goMenu()">MENÚ</button>
</div>

<!-- LEVEL UP -->
<div id="luscreen">
  <h2>SECTOR DESPEJADO</h2>
  <div id="lu-info"></div>
</div>

<script>
// ── AUDIO ──────────────────────────────────────────────
var _ac=null;
function AC(){if(!_ac)_ac=new AudioContext();if(_ac.state==='suspended')_ac.resume();return _ac;}
function tone(f,d,type,vol,det){
  type=type||'sine';vol=vol||.1;det=det||0;
  try{var ctx=AC(),o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=f;o.detune.value=det;
  g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
  o.start();o.stop(ctx.currentTime+d);}catch(e){}
}
function noise(d,vol,lp){vol=vol||.08;lp=lp||1000;
  try{var ctx=AC(),buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*d),ctx.sampleRate),data=buf.getChannelData(0);
  for(var i=0;i<data.length;i++)data[i]=Math.random()*2-1;
  var s=ctx.createBufferSource(),f=ctx.createBiquadFilter(),g=ctx.createGain();
  s.buffer=buf;f.type='lowpass';f.frequency.value=lp;s.connect(f);f.connect(g);g.connect(ctx.destination);
  g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
  s.start();s.stop(ctx.currentTime+d);}catch(e){}
}
function sLaser(){tone(1200,.05,'sawtooth',.12);tone(600,.08,'square',.06,-20);noise(.04,.06,3000);}
function sLaser2(){[0,1,2].forEach(function(i){setTimeout(function(){tone(1100+i*150,.04,'sawtooth',.14);noise(.04,.1,3000);},i*30);});}
function sAlienDie(){tone(280,.3,'sawtooth',.15,-100);tone(140,.5,'triangle',.1);noise(.3,.1,500);}
function sBossHit(){tone(500,.08,'sawtooth',.18);noise(.08,.15,2000);}
function sBossDie(){noise(.8,.4,800);[200,150,100,60].forEach(function(f,i){setTimeout(function(){tone(f,.4,'sawtooth',.25);},i*80);});}
function sDie(){tone(700,.1,'sawtooth',.25);tone(350,.3,'square',.18);noise(.4,.2,1000);setTimeout(function(){tone(90,.8,'triangle',.15);},200);}
function sNova(){[80,120,180,280,400].forEach(function(f,i){setTimeout(function(){tone(f,.4,'sine',.2);},i*40);});noise(.5,.3,600);}
function sPU(){[350,500,800,1100].forEach(function(f,i){setTimeout(function(){tone(f,.15,'sine',.14);},i*50);});}
function sWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,.2,'sine',.16);},i*100);});}
var hbInt=null;
function startHB(lv){if(hbInt)clearInterval(hbInt);var iv=Math.max(400,1100-lv*60);hbInt=setInterval(function(){tone(50,.12,'sine',.09);setTimeout(function(){tone(45,.08,'sine',.06);},140);},iv);}
function stopHB(){if(hbInt){clearInterval(hbInt);hbInt=null;}}

// ── CANVAS ─────────────────────────────────────────────
var cv=document.getElementById('gc');
var cx=cv.getContext('2d');
var pv=document.getElementById('pc');
var px=pv.getContext('2d');
var W,H,CH=200;
function resize(){W=cv.width=pv.width=window.innerWidth;H=cv.height=pv.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// ── PARTICLES ──────────────────────────────────────────
var parts=[];
function addBlood(x,y,n){n=n||8;for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*5;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life:1,sz:2+Math.random()*4,col:'rgba(50,255,100,'});}}
function addSpark(x,y,n,col){n=n||6;col=col||'rgba(0,229,255,';for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=2+Math.random()*8;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,sz:1+Math.random()*3,col:col});}}
function addExpl(x,y,n){n=n||25;for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=3+Math.random()*11;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,sz:3+Math.random()*8,col:Math.random()>.5?'rgba(249,115,22,':'rgba(255,200,50,'});}}
function addNova(x,y){for(var i=0;i<50;i++){var a=(i/50)*Math.PI*2,s=6+Math.random()*12;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,sz:3+Math.random()*7,col:i%2?'rgba(167,139,250,':'rgba(0,229,255,'});}}
function addJet(x,y,n){n=n||3;for(var i=0;i<n;i++){parts.push({x:x+rnd(-3,3),y:y+rnd(-3,3),vx:rnd(-1,1),vy:rnd(1,3),life:1,sz:rnd(3,8),col:'rgba(0,150,255,',jet:true});}}
function updParts(){
  px.clearRect(0,0,W,H);
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;
    p.life-=p.jet?.025:.022;
    if(p.life<=0){parts.splice(i,1);continue;}
    px.beginPath();
    px.fillStyle=p.col+(p.jet?p.life*.5:p.life)+')';
    px.arc(p.x,p.y,p.sz*(p.jet?1+(1-p.life)*.5:p.life),0,Math.PI*2);
    px.fill();
  }
}

// ── HELPERS ────────────────────────────────────────────
function rnd(a,b){return a+Math.random()*(b-a);}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function safe(av,r){var p,n=0;do{p={x:rnd(50,W-50),y:rnd(65,H-CH-25)};}while(dst(p,av)<r&&++n<120);return p;}

// ── BACKGROUNDS ────────────────────────────────────────
var bgOff=0;
var stars=Array.from({length:200},function(){return{x:Math.random()*3000,y:Math.random()*3000,r:Math.random()*1.5+.3,sp:Math.random()*.8+.2};});

function drawStars(){
  bgOff+=.4;
  stars.forEach(function(s){
    var sx=((s.x-bgOff*s.sp)%W+W)%W;
    var sy=(s.y%(H-CH-52))+52;
    var a=.3+s.r*.3;
    cx.fillStyle='rgba(200,220,255,'+a+')';
    cx.beginPath();cx.arc(sx,sy,s.r*.7,0,Math.PI*2);cx.fill();
  });
}

var bgNames=['NAVE ABANDONADA','ASTEROIDES','NEBULA','LUNA','NAVE MADRE'];
function drawBG(lv){
  var t=Date.now()*.001,li=(lv-1)%5;
  bgOff+=.3;
  // Base
  var bases=['#020510','#010308','#050015','#080810','#020502'];
  cx.fillStyle=bases[li];cx.fillRect(0,52,W,H-CH-52);
  drawStars();
  if(li===0) drawStation(t);
  else if(li===1) drawAsteroids(t);
  else if(li===2) drawNebula(t);
  else if(li===3) drawMoon(t);
  else drawMothership(t);
  // Grid
  cx.strokeStyle='rgba(0,100,200,.1)';cx.lineWidth=1;
  for(var x=0;x<W;x+=50){cx.beginPath();cx.moveTo(x,52);cx.lineTo(x,H-CH);cx.stroke();}
  for(var y=52;y<H-CH;y+=50){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  // Vignette
  var vg=cx.createRadialGradient(W/2,(H-CH)/2+52,H*.1,W/2,(H-CH)/2+52,H*.75);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,15,.8)');
  cx.fillStyle=vg;cx.fillRect(0,0,W,H);
  // Scanlines
  cx.fillStyle='rgba(0,0,0,.03)';
  for(var y2=0;y2<H;y2+=3)cx.fillRect(0,y2,W,1);
  // Level name
  cx.save();cx.globalAlpha=.055;cx.fillStyle='#00e5ff';
  cx.font='bold '+Math.min(W/5,60)+'px Courier New';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(bgNames[li],W/2,(H-CH)/2+52);cx.restore();
}
function drawStation(t){
  // Emergency lights
  for(var i=0;i<4;i++){
    if(Math.sin(t*3+i*1.5)>.2){
      var lx=W*(.1+i*.25),ly=H*.3;
      var lg=cx.createRadialGradient(lx,ly,0,lx,ly,55);
      lg.addColorStop(0,i%2?'rgba(220,38,38,.18)':'rgba(0,80,255,.15)');lg.addColorStop(1,'transparent');
      cx.fillStyle=lg;cx.fillRect(0,0,W,H);
      cx.fillStyle=i%2?'#dc2626':'#1d4ed8';cx.beginPath();cx.arc(lx,ly,4,0,Math.PI*2);cx.fill();
    }
  }
}
function drawAsteroids(t){
  var seeds=[[.15,.45,28],[.45,.55,20],[.7,.38,32],[.85,.6,18],[.3,.65,22]];
  seeds.forEach(function(s,i){
    var ax=((s[0]*W+bgOff*(i%3+.4)*.35)%(W+60))-30;
    var ay=s[1]*(H-CH-52)+52+Math.sin(t*.3+i)*6;
    cx.save();cx.translate(ax,ay);cx.rotate(t*.15+i);
    cx.fillStyle='#2a2218';cx.strokeStyle='rgba(100,80,50,.35)';cx.lineWidth=1;
    cx.beginPath();
    for(var j=0;j<6;j++){var a=(j/6)*Math.PI*2,r=s[2]*(.7+Math.sin(a*3)*.3);j===0?cx.moveTo(Math.cos(a)*r,Math.sin(a)*r):cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    cx.closePath();cx.fill();cx.stroke();cx.restore();
  });
}
function drawNebula(t){
  var clouds=[{x:.2,y:.3,r:180,c:'rgba(167,139,250,'},{x:.7,y:.5,r:160,c:'rgba(0,229,255,'},{x:.5,y:.7,r:200,c:'rgba(244,114,182,'},{x:.85,y:.2,r:130,c:'rgba(249,115,22,'}];
  clouds.forEach(function(c,i){
    var nx=c.x*W+Math.sin(t*.1+i)*18,ny=c.y*(H-CH-52)+52+Math.cos(t*.08+i)*12;
    var pl=.04+Math.sin(t*.2+i)*.02;
    var lg=cx.createRadialGradient(nx,ny,0,nx,ny,c.r);
    lg.addColorStop(0,c.c+pl+')');lg.addColorStop(1,'transparent');
    cx.fillStyle=lg;cx.fillRect(0,0,W,H);
  });
}
function drawMoon(t){
  // Ground
  cx.fillStyle='#10101a';cx.fillRect(0,H*.7,W,H-CH-H*.7+52);
  cx.strokeStyle='rgba(100,100,150,.2)';cx.lineWidth=1;cx.beginPath();cx.moveTo(0,H*.7);cx.lineTo(W,H*.7);cx.stroke();
  // Craters
  [[.15,.78,22],[.5,.74,30],[.8,.79,18],[.35,.82,16]].forEach(function(c){
    cx.strokeStyle='rgba(80,80,120,.3)';cx.lineWidth=1.5;
    cx.beginPath();cx.ellipse(c[0]*W,c[1]*H,c[2],c[2]*.4,0,0,Math.PI*2);cx.stroke();
  });
  // Alien structures
  [[.25,.7],[.6,.68],[.78,.71]].forEach(function(a,i){
    var gv=Math.sin(t*2+i)*.5+.5;
    cx.fillStyle='rgba(50,255,100,'+(gv*.15)+')';
    cx.beginPath();cx.moveTo(a[0]*W,a[1]*H);cx.lineTo(a[0]*W-12,a[1]*H+22);cx.lineTo(a[0]*W+12,a[1]*H+22);cx.fill();
  });
}
function drawMothership(t){
  // Bio-veins
  [[W*.2,W*.3],[W*.5,W*.45],[W*.8,W*.7]].forEach(function(v,i){
    var p=Math.sin(t*1.5+i)*.5+.5;
    cx.strokeStyle='rgba(0,'+(120+Math.floor(p*80))+',0,'+(p*.12)+')';cx.lineWidth=3+p*2;
    cx.beginPath();cx.moveTo(v[0],52);cx.bezierCurveTo(v[0]+Math.sin(t+i)*25,H*.35,v[1]+Math.sin(t*1.2+i)*20,H*.65,v[1],H-CH);cx.stroke();
  });
}

// ── DRAW FUNCTIONS ─────────────────────────────────────
function drawAstronaut(x,y,dir,mv,sh){
  var t=Date.now(),bob=mv?Math.sin(t*.016)*2:0,fl=dir<0?-1:1;
  cx.save();cx.translate(x,y+bob);cx.scale(fl,1);
  if(mv)addJet(x,y+15,3);
  // shadow

var jb=document.getElementById('jbase'),js=document.getElementById('jstick');
var jActive=false,jDx=0,jDy=0,aimDir={x:1,y:0};
function jMov(cx2,cy2){
  var r=jb.getBoundingClientRect(),mx=r.left+r.width/2,my=r.top+r.height/2,maxD=r.width/2*.85;
  var dx=cx2-mx,dy=cy2-my,d=Math.min(maxD,Math.hypot(dx,dy)),ang=Math.atan2(dy,dx);
  var sx=Math.cos(ang)*d,sy=Math.sin(ang)*d;
  js.style.transform='translate('+sx+'px,'+sy+'px)';
  jDx=sx/maxD;jDy=sy/maxD;
  if(d>6)aimDir={x:sx/maxD,y:sy/maxD};
}
function jEnd(){
  jActive=false;jDx=0;jDy=0;
  js.style.transition='transform .1s';js.style.transform='translate(0,0)';
  setTimeout(function(){js.style.transition='';},120);
  window.removeEventListener('touchmove',jTM);window.removeEventListener('touchend',jEnd);
  window.removeEventListener('mousemove',jTM);window.removeEventListener('mouseup',jEnd);
}
function jTM(e){if(!jActive)return;if(e.cancelable)e.preventDefault();var t='touches' in e?e.touches[0]:e;jMov(t.clientX,t.clientY);}
jb.addEventListener('touchstart',function(e){e.preventDefault();jActive=true;js.style.transition='none';jMov(e.touches[0].clientX,e.touches[0].clientY);window.addEventListener('touchmove',jTM,{passive:false});window.addEventListener('touchend',jEnd);},{passive:false});
jb.addEventListener('mousedown',function(e){jActive=true;js.style.transition='none';jMov(e.clientX,e.clientY);window.addEventListener('mousemove',jTM);window.addEventListener('mouseup',jEnd);});

// ── ACTIONS ────────────────────────────────────────────
function spawnBul(ao,sp){
  sp=sp||false;
  var spd=BSPD*(sp?1.5:1),len=Math.hypot(aimDir.x,aimDir.y)||1;
  var bx=aimDir.x/len,by=aimDir.y/len,c=Math.cos(ao),s=Math.sin(ao);
  bullets.push({id:uid++,x:player.x,y:player.y,vx:(bx*c-by*s)*spd,vy:(bx*s+by*c)*spd,sp:sp});
}
function doShoot(){
  if(puType==='OVERCHARGE'&&Date.now()<puEnd){
    sLaser2();spawnBul(0,true);
    setTimeout(function(){spawnBul(.12,true);},40);
    setTimeout(function(){spawnBul(-.12,true);},80);
    addSpark(player.x,player.y,6,'rgba(249,115,22,');
  }else{
    sLaser();spawnBul(0);
    addSpark(player.x,player.y,3,'rgba(0,229,255,');
  }
}
function doNova(){
  if(novas<=0)return;
  sNova();novas--;
  addNova(player.x,player.y);
  flashOv('rgba(167,139,250,.3)',100);
  for(var i=aliens.length-1;i>=0;i--){
    if(dst(aliens[i],player)<210){
      var ang=Math.atan2(aliens[i].y-player.y,aliens[i].x-player.x);
      addBlood(aliens[i].x,aliens[i].y,6);
      aliens[i]={id:uid++,x:Math.max(50,Math.min(W-50,aliens[i].x+Math.cos(ang)*70)),y:Math.max(65,Math.min(H-CH-25,aliens[i].y+Math.sin(ang)*70)),dir:1,big:Math.random()>.75};
      score+=5;kills++;
    }
  }
  for(var j=0;j<bosses.length;j++){if(dst(bosses[j],player)<230){bosses[j].hp-=8;addBlood(bosses[j].x,bosses[j].y,8);sBossHit();}}
  shielded=true;setTimeout(function(){shielded=false;},1500);
  updHUD();
}
function spawnItem(){
  var r=Math.random(),t=r<.18?'MEDKIT':r<.32?'SHIELD':r<.48?'OVERCHARGE':r<.62?'JETPACK':r<.8?'TIMESLOW':'NUKE';
  var d=IDEFS[t];
  items.push({id:uid++,x:rnd(55,W-55),y:rnd(65,H-CH-35),type:t,c:d.c,l:d.l});
}

function initGame(){

}
function initRound(){
  resize(); // ensure W,H correct
  player={x:W/2,y:(H-CH)/2+52,dir:1,moving:false};
  portalP=safe(player,SAFE);
  bullets=[];items=[];bosses=[];parts=[];
  frozen=false;puType=null;shielded=false;
  document.getElementById('ov-shield').style.display='none';
  document.getElementById('ov-slow').style.display='none';

  aliens=[];
  for(var i=0;i<ac;i++)aliens.push({id:uid++,big:Math.random()>.72,...safe(player,SAFE),dir:1});
  if(level%3===0){var hp=20+level*5;bosses.push({id:uid++,...safe(player,SAFE+55),hp:hp,maxHp:hp});}
  startHB(level);updHUD();
}

// ── LOOP ───────────────────────────────────────────────
function loop(){
  if(gs!=='playing')return;
  RAF=requestAnimationFrame(loop);
  var now=Date.now();
  if(frozen&&now>freezeEnd){frozen=false;document.getElementById('ov-slow').style.display='none';}
  if(puType&&puType!=='SHIELD'&&now>puEnd){puType=null;document.getElementById('ov-slow').style.display='none';document.getElementById('hud-pu').textContent='';}
  if(puType==='SHIELD'&&now>puEnd){puType=null;shielded=false;document.getElementById('ov-shield').style.display='none';document.getElementById('hud-pu').textContent='';}
  if(now-lastItem>5500){if(Math.random()>.35)spawnItem();lastItem=now;}
  // auto-shoot
  if(now-lastAuto>AI){
    var nd=Infinity,nd2={x:1,y:0};
    var tgts=aliens.concat(bosses);
    for(var ti=0;ti<tgts.length;ti++){var td=dst(player,tgts[ti]);if(td<nd&&td<AR){nd=td;nd2={x:(tgts[ti].x-player.x)/td,y:(tgts[ti].y-player.y)/td};}}
    if(nd<AR){aimDir=nd2;doShoot();lastAuto=now;}
  }
  // move
  var spd=PSP*(puType==='JETPACK'&&now<puEnd?1.8:1),mv=false;
  if(Math.abs(jDx)>.04||Math.abs(jDy)>.04){player.x+=jDx*spd;player.y+=jDy*spd;player.dir=jDx<0?-1:1;mv=true;}
  player.x=Math.max(18,Math.min(W-18,player.x));
  player.y=Math.max(56,Math.min(H-CH-10,player.y));
  player.moving=mv;
  // bullets
  for(var i=bullets.length-1;i>=0;i--){var b=bullets[i];b.x+=b.vx;b.y+=b.vy;if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20)bullets.splice(i,1);}
  // aliens
  var asp=(ASP+level*.1)*(frozen?.2:1)*(puType==='TIMESLOW'&&now<puEnd?.2:1);
  var caught=false;
  for(var zi=aliens.length-1;zi>=0;zi--){
    var z=aliens[zi],dead=false;
    for(var bi=bullets.length-1;bi>=0;bi--){
      if(dst(z,bullets[bi])<(z.big?28:20)){dead=true;bullets.splice(bi,1);score+=z.big?20:10+level*3;kills++;sAlienDie();addBlood(z.x,z.y,z.big?12:7);break;}
    }
    if(dead){aliens[zi]={id:uid++,big:Math.random()>.75,...safe(player,SAFE),dir:1};}
    else{var ang=Math.atan2(player.y-z.y,player.x-z.x);z.x+=Math.cos(ang)*asp*(z.big?.7:1);z.y+=Math.sin(ang)*asp*(z.big?.7:1);z.dir=player.x<z.x?-1:1;if(dst(z,player)<(z.big?28:22)&&!shielded)caught=true;}
  }
  // bosses
  var bsp=BSP*(frozen?.1:1)*(puType==='TIMESLOW'&&now<puEnd?.15:1);
  for(var bsi=bosses.length-1;bsi>=0;bsi--){
    var boss=bosses[bsi];
    for(var bui=bullets.length-1;bui>=0;bui--){
      if(dst(boss,bullets[bui])<34){boss.hp-=bullets[bui].sp?3:1;bullets.splice(bui,1);sBossHit();addBlood(boss.x,boss.y,5);if(boss.hp<=0){score+=500+level*100;kills+=15;sBossDie();addExpl(boss.x,boss.y,30);addNova(boss.x,boss.y);bosses.splice(bsi,1);break;}}
    }
    if(bosses[bsi]){var ba=Math.atan2(player.y-boss.y,player.x-boss.x);boss.x+=Math.cos(ba)*bsp;boss.y+=Math.sin(ba)*bsp;if(dst(boss,player)<42&&!shielded)caught=true;}
  }
  // items
  for(var ii=items.length-1;ii>=0;ii--){
    var it=items[ii];
    if(dst(it,player)<28){
      items.splice(ii,1);score+=80;sPU();addSpark(player.x,player.y,10,'rgba(0,229,255,');
      if(it.type==='MEDKIT'){lives=Math.min(5,lives+1);showPU('💊 VIDA RESTAURADA');}
      else if(it.type==='SHIELD'){shielded=true;puType='SHIELD';puEnd=now+8000;document.getElementById('ov-shield').style.display='block';showPU('🛡 ESCUDO ACTIVO');}
      else if(it.type==='NUKE'){addExpl(W/2,(H-CH)/2,40);flashOv('rgba(34,197,94,.4)',120);for(var ni=0;ni<aliens.length;ni++){addBlood(aliens[ni].x,aliens[ni].y,6);aliens[ni]={id:uid++,big:Math.random()>.75,...safe(player,SAFE),dir:1};}for(var nbi=0;nbi<bosses.length;nbi++){bosses[nbi].hp-=8;addBlood(bosses[nbi].x,bosses[nbi].y,8);}score+=aliens.length*15;kills+=aliens.length;showPU('☢ NUKE!');}
      else if(it.type==='TIMESLOW'){puType='TIMESLOW';puEnd=now+7000;document.getElementById('ov-slow').style.display='block';showPU('⏱ TIEMPO LENTO');}
      else{puType=it.type;puEnd=now+(it.type==='OVERCHARGE'?8000:9000);showPU('★ '+it.type.replace('_',' '));}
      updHUD();
    }
  }
  updHUD();
  if(caught){onDeath();return;}
  if(dst(player,portalP)<32){onLevelUp();return;}
  if(now-lastAmb>Math.max(600,1800-level*75)){if(Math.random()>.55)sAlienDie();lastAmb=now;}
  // RENDER
  drawBG(level);
  drawPortal(portalP.x,portalP.y);
  for(var iti=0;iti<items.length;iti++)drawItem(items[iti]);
  for(var bli=0;bli<bullets.length;bli++)drawBullet(bullets[bli].x,bullets[bli].y,bullets[bli].sp);
  for(var ali=0;ali<aliens.length;ali++)drawAlien(aliens[ali].x,aliens[ali].y,aliens[ali].dir,frozen,aliens[ali].big);
  for(var boi=0;boi<bosses.length;boi++)drawBoss(bosses[boi].x,bosses[boi].y,bosses[boi].hp,bosses[boi].maxHp);
  drawAstronaut(player.x,player.y,player.dir,player.moving,shielded);
  cx.fillStyle='rgba(0,2,15,.6)';cx.fillRect(0,H-CH,W,CH);
  cx.strokeStyle='rgba(0,200,255,.22)';cx.lineWidth=1;cx.beginPath();cx.moveTo(0,H-CH);cx.lineTo(W,H-CH);cx.stroke();
  updParts();
}

// ── GAME EVENTS ────────────────────────────────────────
function onDeath(){
  cancelAnimationFrame(RAF);sDie();addExpl(player.x,player.y,15);
  flashOv('rgba(220,38,38,.5)',180);
  lives--;
  if(lives>0){
    updHUD();
    setTimeout(function(){parts=[];initRound();gs='playing';lastItem=Date.now();lastAuto=Date.now();RAF=requestAnimationFrame(loop);},1200);
  }else{
    stopHB();gs='gameover';
    var hs=parseInt(localStorage.getItem(HS)||'0');
    if(score>hs)localStorage.setItem(HS,String(score));
    setTimeout(function(){
      document.getElementById('go-stats').innerHTML=
        '<div class="srow">SECTOR: <span>'+level+'</span></div>'+
        '<div class="srow">KILLS: <span>'+kills+'</span></div>'+
        '<div class="srow">SCORE: <span>'+score.toLocaleString()+'</span></div>'+
        (score>=hs&&score>0?'<div style="color:#f97316;margin-top:.5em;text-shadow:0 0 8px #f97316">🏆 NUEVO RÉCORD</div>':'');
      document.getElementById('goscreen').style.display='flex';
      document.getElementById('ctrl').style.display='none';
      document.getElementById('hud').style.display='none';
    },1300);
  }
}
function onLevelUp(){
  cancelAnimationFrame(RAF);sWin();stopHB();
  addSpark(player.x,player.y,20,'rgba(0,229,255,');addNova(player.x,player.y);
  flashOv('rgba(0,229,255,.22)',130);
  score+=level*600;level++;lives=Math.min(5,lives+1);
  var lnames=['ASTEROIDES','NEBULA','LUNA','NAVE MADRE','NAVE ABANDONADA'];
  var lu=document.getElementById('luscreen');
  document.getElementById('lu-info').innerHTML='+'+((level-1)*600)+' PTS · VIDA RESTAURADA<br><span style="color:rgba(167,139,250,.7);font-size:.8rem">PRÓXIMO SECTOR: '+lnames[(level-1)%5]+'</span>';
  lu.style.display='flex';
  setTimeout(function(){lu.style.display='none';parts=[];initRound();gs='playing';lastItem=Date.now();lastAuto=Date.now();RAF=requestAnimationFrame(loop);},2600);
}

// ── SCREEN FUNCTIONS ───────────────────────────────────
function startGame(){
  document.getElementById('menu').style.display='none';
  document.getElementById('ctrl').style.display='flex';
  document.getElementById('hud').style.display='flex';
  initGame();
  gs='playing';
  lastItem=Date.now();lastAuto=Date.now();
  cancelAnimationFrame(RAF);
  RAF=requestAnimationFrame(loop);
}
function retryGame(){
  document.getElementById('goscreen').style.display='none';
  document.getElementById('ctrl').style.display='flex';
  document.getElementById('hud').style.display='flex';
  initGame();gs='playing';lastItem=Date.now();lastAuto=Date.now();
  cancelAnimationFrame(RAF);RAF=requestAnimationFrame(loop);
}
function goMenu(){
  document.getElementById('goscreen').style.display='none';
  stopHB();gs='menu';
  document.getElementById('menu').style.display='flex';
  var hs=localStorage.getItem(HS);
  if(hs&&parseInt(hs)>0){document.getElementById('hs-line').style.display='block';document.getElementById('hs-val').textContent=parseInt(hs).toLocaleString();}
}

// ── BUTTON EVENTS ──────────────────────────────────────
document.getElementById('bfire').addEventListener('touchstart',function(e){e.preventDefault();if(gs==='playing')doShoot();},{passive:false});
document.getElementById('bfire').addEventListener('mousedown',function(e){e.preventDefault();if(gs==='playing')doShoot();});
document.getElementById('bnova').addEventListener('touchstart',function(e){e.preventDefault();if(gs==='playing')doNova();},{passive:false});
document.getElementById('bnova').addEventListener('mousedown',function(e){e.preventDefault();if(gs==='playing')doNova();});
document.getElementById('babort').addEventListener('touchstart',function(e){e.preventDefault();cancelAnimationFrame(RAF);stopHB();gs='menu';document.getElementById('ctrl').style.display='none';document.getElementById('hud').style.display='none';document.getElementById('menu').style.display='flex';},{passive:false});
document.getElementById('babort').addEventListener('click',function(){cancelAnimationFrame(RAF);stopHB();gs='menu';document.getElementById('ctrl').style.display='none';document.getElementById('hud').style.display='none';document.getElementById('menu').style.display='flex';});

// ── INIT DISPLAY ───────────────────────────────────────
var hs0=localStorage.getItem(HS);
if(hs0&&parseInt(hs0)>0){document.getElementById('hs-line').style.display='block';document.getElementById('hs-val').textContent=parseInt(hs0).toLocaleString();}
cx.fillStyle='#010310';cx.fillRect(0,0,window.innerWidth,window.innerHeight);
</script>
